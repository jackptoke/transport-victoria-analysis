# This is a Databricks asset bundle definition for transport_victoria_databricks.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: transport_victoria_databricks
  uuid: ec8c292f-c1f9-4ff2-9e8c-46ab0f5d01b4

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405607273791803.3.azuredatabricks.net
      profile: transport_vic
    variables:
      catalog: transport_vic_dev
      schema: dev
  prod:
    mode: production
    workspace:
      host: https://adb-7405607273791803.3.azuredatabricks.net
      profile: transport_vic
      # We explicitly deploy to /Workspace/Users/jack.toke_outlook.com#ext#@jacktokeoutlook.onmicrosoft.com to make sure we only have a single copy.
      root_path: /Workspace/Users/jack.toke_outlook.com#ext#@jacktokeoutlook.onmicrosoft.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: transport_vic_prod
      schema: prod
    permissions:
      - user_name: jack.toke_outlook.com#ext#@jacktokeoutlook.onmicrosoft.com
        level: CAN_MANAGE
