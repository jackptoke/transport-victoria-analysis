# Silver job: decode bronze protobuf bytes into typed stop-level rows.
# Triggered whenever the bronze table gets new rows (i.e. right after the bronze job runs).

resources:
  jobs:
    silver_trip_updates:
      name: silver_trip_updates

      # One run at a time — overlapping runs would collide on the silver streaming checkpoint.
      max_concurrent_runs: 1

      trigger:
        # Fire when the bronze table is updated. Backticks because the schema name starts with a digit;
        # catalog resolves to transport_vic_dev / _prod per target.
        table_update:
          table_names:
            - ${var.catalog}.`01_bronze`.vline_trip_updates
          # Debounce: wait for bronze to settle and don't re-fire more than once a minute.
          min_time_between_triggers_seconds: 60

      email_notifications:
        on_failure:
          - jack.toke@outlook.com

      # Passed to the notebook as a `catalog` widget; resolves to transport_vic_dev / _prod per target.
      parameters:
        - name: catalog
          default: ${var.catalog}

      tasks:
        - task_key: bronze_to_silver
          notebook_task:
            notebook_path: ../src/transport_victoria_databricks_etl/02_silver/02_bronze_to_silver.ipynb
          # Serverless environment — carries gtfs-realtime-bindings for the one-time descriptor build.
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - gtfs-realtime-bindings==2.1.0
