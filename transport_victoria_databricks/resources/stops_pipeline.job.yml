# Job: build the GTFS static stops dimension (bronze -> silver).
# Manual / run-once — no schedule or trigger. Silver runs only after bronze succeeds.

resources:
  jobs:
    stops_pipeline:
      name: stops_pipeline

      # Static reference data — one run at a time is plenty.
      max_concurrent_runs: 1

      # Any task failure emails Jack.
      email_notifications:
        on_failure:
          - jack.toke@outlook.com

      # Passed to both notebooks as a `catalog` widget; resolves to transport_vic_dev / _prod per target.
      parameters:
        - name: catalog
          default: ${var.catalog}

      tasks:
        - task_key: raw_stops_to_bronze
          notebook_task:
            notebook_path: ../src/transport_victoria_databricks_etl/01_bronze/01_raw_stops_to_bronze.ipynb

        - task_key: bronze_stops_to_silver
          # Runs only if the bronze task succeeds (all_success is the default dependency rule).
          depends_on:
            - task_key: raw_stops_to_bronze
          notebook_task:
            notebook_path: ../src/transport_victoria_databricks_etl/02_silver/02_bronze_stops_to_silver.ipynb
